<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basit Masood — Coming Soon</title>
  <meta name="description" content="Something new is coming. Head of Product Design with 8+ years in fintech.">
  <meta property="og:title" content="Basit Masood — Coming Soon">
  <meta property="og:description" content="Something new is coming. Head of Product Design with 8+ years in fintech.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    @font-face { font-family: 'General Sans'; src: url('/fonts/GeneralSans-Medium.woff2') format('woff2'), url('/fonts/GeneralSans-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'General Sans'; src: url('/fonts/GeneralSans-Semibold.woff2') format('woff2'), url('/fonts/GeneralSans-Semibold.otf') format('opentype'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Literata'; src: url('/fonts/Literata-Regular.woff2') format('woff2'), url('/fonts/Literata-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Literata'; src: url('/fonts/Literata-Italic.woff2') format('woff2'), url('/fonts/Literata-Italic.otf') format('opentype'); font-weight: 400; font-style: italic; font-display: swap; }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%; background: #0E0F10;
      font-family: 'General Sans', -apple-system, sans-serif;
      color: #f5f0e8; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    .wrap {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
      position: relative;
    }

    /* Tube light logo */
    .logo { width: 60px; margin-bottom: 48px; }
    .logo svg { width: 100%; overflow: visible; }
    .logo-tube { fill: #f5f0e8; opacity: 0; animation: tubeFlicker 4s ease infinite; }
    .logo-tube-bloom { fill: #f5f0e8; filter: blur(8px); opacity: 0; animation: tubeBloom 4s ease infinite; }
    .logo-dot { fill: #e11d48; }
    .logo-dot-glow { fill: #e11d48; filter: blur(6px); opacity: 0.4; animation: dotPulse 4s ease infinite; }

    @keyframes tubeFlicker { 0%{opacity:0}20%{opacity:0}22%{opacity:.15}23%{opacity:0}24.5%{opacity:.3}25.5%{opacity:.05}27%{opacity:.5}28.5%{opacity:.08}30%{opacity:.7}31%{opacity:.15}33%{opacity:1}70%{opacity:1}72%{opacity:.3}73.5%{opacity:.9}75%{opacity:.15}76%{opacity:.7}77.5%{opacity:.05}79%{opacity:.4}81%{opacity:0}100%{opacity:0} }
    @keyframes tubeBloom { 0%{opacity:0}32%{opacity:0}34%{opacity:.25}40%{opacity:.08}70%{opacity:.08}73%{opacity:0}100%{opacity:0} }
    @keyframes dotPulse { 0%{opacity:.3;transform:scale(1)}33%{opacity:.6;transform:scale(1.3)}70%{opacity:.6;transform:scale(1.3)}80%{opacity:.3;transform:scale(1)}100%{opacity:.3;transform:scale(1)} }

    .label {
      font-size: 14px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: #e11d48; margin-bottom: 20px;
    }

    h1 {
      font-family: 'General Sans', sans-serif; font-size: clamp(28px, 4vw, 48px);
      font-weight: 600; line-height: 1.25; color: #f5f0e8;
      margin-bottom: 16px;
    }

    .sub {
      font-family: 'Literata', serif; font-size: 18px; font-weight: 400;
      font-style: italic; line-height: 1.6;
      color: rgba(245, 240, 232, 0.45); margin-bottom: 56px;
      max-width: 440px;
    }

    /* Countdown */
    .countdown {
      display: flex; gap: 32px; align-items: center; justify-content: center;
      margin-bottom: 56px;
    }
    .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .cd-val {
      font-family: 'General Sans', sans-serif; font-size: clamp(40px, 6vw, 64px);
      font-weight: 600; color: #f5f0e8; line-height: 1;
      min-width: 80px;
    }
    .cd-label {
      font-size: 14px; font-weight: 500; color: rgba(245, 240, 232, 0.4);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .cd-sep {
      font-family: 'General Sans', sans-serif; font-size: 40px;
      font-weight: 300; color: rgba(245, 240, 232, 0.15);
      margin-top: -20px;
    }

    /* Contact */
    .contact {
      display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
      justify-content: center;
    }
    .contact a {
      font-family: 'General Sans', sans-serif; font-size: 15px; font-weight: 500;
      color: rgba(245, 240, 232, 0.5); text-decoration: none;
      transition: color 0.2s;
    }
    .contact a:hover { color: #e11d48; }
    .contact .email {
      color: #e11d48;
      border-bottom: 1px solid rgba(225, 29, 72, 0.3);
    }
    .contact .email:hover { border-color: #e11d48; }

    /* Rose dot */
    .dot {
      position: absolute; bottom: 48px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #e11d48;
      box-shadow: 0 0 10px 3px rgba(225, 29, 72, 0.3);
    }

    @media (max-width: 500px) {
      .countdown { gap: 16px; }
      .cd-val { font-size: 36px; min-width: 56px; }
      .cd-sep { font-size: 28px; }
      .contact { flex-direction: column; gap: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-tube, .logo-tube-bloom, .logo-dot-glow { animation: none; }
      .logo-tube { opacity: 0.8; }
      .logo-dot-glow { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg viewBox="0 0 30 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="logo-tube" d="M25.3808 3.56993H3.95236V5.54845C3.95236 7.14 5.38078 8.4302 7.14282 8.4302H22.1904C23.9524 8.4302 25.3808 7.14 25.3808 5.54845V3.56993ZM29.3332 5.54845C29.3332 9.11162 26.1352 12.0001 22.1904 12.0001H7.14282C3.19795 12.0001 0 9.11162 0 5.54845V0H29.3332V5.54845Z"/>
        <path class="logo-tube-bloom" d="M25.3808 3.56993H3.95236V5.54845C3.95236 7.14 5.38078 8.4302 7.14282 8.4302H22.1904C23.9524 8.4302 25.3808 7.14 25.3808 5.54845V3.56993ZM29.3332 5.54845C29.3332 9.11162 26.1352 12.0001 22.1904 12.0001H7.14282C3.19795 12.0001 0 9.11162 0 5.54845V0H29.3332V5.54845Z"/>
        <circle class="logo-dot" cx="14.6662" cy="17.3332" r="2.6667"/>
        <circle class="logo-dot-glow" cx="14.6662" cy="17.3332" r="2.6667"/>
      </svg>
    </div>

    <p class="label">New version launching</p>
    <h1>Something better<br>is on the way.</h1>
    <p class="sub">Rebuilding from the ground up. Same work, better story.</p>

    <div class="countdown" id="countdown">
      <div class="cd-unit">
        <span class="cd-val" id="cdHours">48</span>
        <span class="cd-label">Hours</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-val" id="cdMinutes">00</span>
        <span class="cd-label">Minutes</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-val" id="cdSeconds">00</span>
        <span class="cd-label">Seconds</span>
      </div>
    </div>

    <div class="contact">
      <a href="mailto:basitmasood999@gmail.com" class="email">basitmasood999@gmail.com</a>
      <a href="https://linkedin.com/in/iabm" target="_blank">LinkedIn</a>
    </div>

    <div class="dot"></div>
  </div>

  <script>
    // 48-hour countdown from page load (or from a fixed target)
    // Set target to 48 hours from April 1, 2026 00:00 GST (UTC+4)
    const target = new Date('2026-04-07T00:00:00+04:00').getTime();

    function update() {
      const now = Date.now();
      const diff = Math.max(0, target - now);

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('cdHours').textContent = String(hours).padStart(2, '0');
      document.getElementById('cdMinutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('cdSeconds').textContent = String(seconds).padStart(2, '0');

      if (diff > 0) requestAnimationFrame(update);
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
